<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkEye AI | Cybersecurity Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* STITCH ANTI-GRAVITY COLORS */
            --void: #080C14;
            --surface: #0D1420;
            --surface-elevated: #111827;
            --surface-modal: #0A1628;
            --sidebar-bg: #050810;
            
            --blue-accent: #2563EB;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #22C55E;
            
            --text-primary: #E2E8F0;
            --text-secondary: #64748B;
            --text-tertiary: #1E3A5F;
            
            /* LEVEL SHADOWS */
            --shadow-l1: 0 0 0 0.5px rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.7);
            --shadow-l2: 0 0 0 0.5px rgba(37,99,235,0.3), 0 16px 48px rgba(0,0,0,0.8), 0 0 40px rgba(37,99,235,0.06);
            --shadow-l3: 0 0 0 1px rgba(37,99,235,0.2), 0 24px 64px rgba(0,0,0,0.9), 0 0 80px rgba(37,99,235,0.1);
            --shadow-danger-l2: 0 0 0 0.5px rgba(239,68,68,0.2), 0 16px 48px rgba(0,0,0,0.8), 0 0 40px rgba(239,68,68,0.06);
            
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--void);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* GLOBALS: HEX GRID & NOISE */
        .viewport-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .hex-grid {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill-rule='evenodd' stroke='%232563EB' stroke-width='1' fill='none' opacity='0.03'/%3E%3C/svg%3E");
            z-index: 1;
        }

        .noise-texture {
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAYAAACtWK6eAAAAL0lEQVR4nO3BAQ0AAADCoPdPbQ8HFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAOA58WwAAf9RGoEAAAAASUVORK5CYII=");
            opacity: 0.03;
            z-index: 2;
        }

        .radial-glow {
            background: radial-gradient(circle at center, rgba(37,99,235,0.04) 0%, transparent 60%);
            z-index: 1;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(37,99,235, 0.4);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(37,99,235, 0.7);
        }

        /* LAYOUT SHELL */
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 10;
        }

        /* SIDEBAR RAIL */
        #sidebar {
            width: 60px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(37,99,235,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            z-index: 50;
        }

        #sidebar:hover {
            width: 220px;
        }

        .sidebar-logo {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 16px;
            white-space: nowrap;
            padding: 0 16px;
        }

        .sidebar-logo .shield-icon {
            width: 24px;
            height: 24px;
            color: white;
            flex-shrink: 0;
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            padding: 0 12px;
        }

        .nav-item {
            height: 36px;
            width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            text-decoration: none;
            overflow: hidden;
            background: transparent;
        }

        #sidebar:hover .nav-item {
            width: 100%;
            justify-content: flex-start;
            padding: 0 12px;
            gap: 12px;
        }

        .nav-item span {
            display: none;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
        }

        #sidebar:hover .nav-item span {
            display: block;
        }

        .nav-item.active {
            color: white;
            background-color: var(--surface);
            box-shadow: 0 0 12px rgba(37,99,235, 0.5);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 16px;
            background-color: var(--blue-accent);
        }

        .nav-separator {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.05);
            margin: 16px 0;
        }

        .user-avatar {
            margin-top: auto;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue-accent), #1E40AF);
            box-shadow: var(--shadow-l1);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* MAIN CONTENT */
        #main {
            flex: 1;
            padding: 24px 40px;
            overflow-y: auto;
            position: relative;
        }

        /* HEADER BAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            gap: 20px;
        }

        .search-rail {
            width: 440px;
            height: 44px;
            background-color: var(--surface);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: var(--shadow-l1);
        }

        .search-rail span {
            font-family: var(--font-mono);
            color: #334155;
            margin-right: 12px;
        }

        .search-rail input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 13px;
            width: 100%;
            outline: none;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .live-indicator {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .live-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--success);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse-glow 2s infinite;
        }

        .live-time {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ANTI-GRAVITY CARDS */
        .card {
            background-color: var(--surface);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-l1);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-l2);
        }

        .card-l2 {
            background-color: var(--surface-elevated);
            box-shadow: var(--shadow-l2);
        }

        .card-l3 {
            background-color: var(--surface-modal);
            box-shadow: var(--shadow-l3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-primary);
        }

        .shortcut-hint {
            font-size: 10px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
            background: rgba(255,255,255,0.03);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* KPI COMPONENTS */
        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .kpi-card .label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .kpi-card .value {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 16px;
            line-height: 1;
        }

        .sparkline {
            height: 24px;
            width: 48px;
            margin-bottom: 16px;
        }

        .kpi-progress {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            width: 100%;
        }

        .kpi-progress-bar {
            height: 100%;
            border-radius: 6px;
            box-shadow: 0 0 8px currentColor;
        }

        /* COMPONENTS: TABLES */
        .table-container {
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            font-family: var(--font-mono);
            font-size: 10px;
            color: #334155;
            text-align: left;
            padding: 0 0 16px 0;
            border-bottom: 1px solid rgba(255,255,255, 0.06);
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255, 0.04);
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background-color: rgba(37,99,235, 0.05);
        }

        tbody td {
            padding: 16px 0;
            font-size: 13px;
        }

        .ip-address {
            font-family: var(--font-mono);
            color: var(--danger);
            text-decoration: underline dotted rgba(239,68,68, 0.4);
            cursor: pointer;
        }

        /* SEVERITY CHIPS */
        .severity-chip {
            display: inline-flex;
            padding: 2px 6px 2px 8px;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-left: 2px solid var(--accent);
            line-height: 1.4;
        }

        /* INVESTIGATION SPECIFIC */
        .investigation-header {
            border-left: 3px solid var(--danger);
            margin-bottom: 32px;
        }

        .timeline-container {
            position: relative;
            padding-left: 32px;
            padding-top: 8px;
        }

        .timeline-line {
            position: absolute;
            left: 5px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255,255,255,0.06);
        }

        .timeline-pulse {
            position: absolute;
            width: 3px;
            height: 32px;
            background: var(--blue-accent);
            left: 4px;
            box-shadow: 0 0 16px var(--blue-accent);
            border-radius: 2px;
            animation: travel 4s linear infinite;
        }

        .node {
            position: relative;
            margin-bottom: 40px;
        }

        .node-dot {
            position: absolute;
            left: -32px;
            top: 4px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            border: 2px solid var(--surface);
        }

        /* BUTTONS */
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .btn-danger {
            background-color: var(--danger);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            box-shadow: 0 0 24px rgba(239, 68, 68, 0.4);
            transform: translateY(-1px);
        }

        .btn-success {
            background-color: var(--success);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        .btn-success:hover {
            box-shadow: 0 0 24px rgba(34, 197, 94, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.1);
        }

        /* ANIMATIONS */
        @keyframes pulse-glow {
            0% { opacity: 0.6; }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; }
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes scanIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes travel {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes aiScan {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .float-entry {
            animation: floatIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        /* SCAN LINE */
        .scan-container {
            position: relative;
        }
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(37,99,235, 0.1);
            pointer-events: none;
            z-index: 5;
            animation: scan 3s linear infinite;
        }

        /* AI SHIMMER */
        .ai-shimmer {
            background: linear-gradient(90deg, #0A1628 40%, rgba(37,99,235, 0.15) 50%, #0A1628 60%);
            background-size: 200%;
            animation: aiScan 3s linear infinite;
        }

        /* UTILS */
        .hidden { display: none !important; }
        .text-right { text-align: right; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-4 { gap: 16px; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .p-0 { padding: 0 !important; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .dashboard-footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            color: var(--success);
            font-family: var(--font-mono);
            font-size: 13px;
            background: rgba(34, 197, 94, 0.02);
            border: 1px dashed rgba(34, 197, 94, 0.1);
            border-radius: 12px;
        }

        /* TOOLTIP */
        #ip-tooltip {
            position: fixed;
            background-color: var(--surface-modal);
            padding: 16px;
            border-radius: 12px;
            box-shadow: var(--shadow-l3);
            border: 1px solid rgba(37,99,235, 0.2);
            font-family: var(--font-mono);
            font-size: 11px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            backdrop-filter: blur(8px);
        }

        /* CODE BLOCK */
        .code-block {
            background: #020408 !important;
            padding: 24px !important;
            border-radius: 12px !important;
            font-family: var(--font-mono) !important;
            font-size: 12px !important;
            color: #10B981 !important;
            line-height: 1.6 !important;
            position: relative;
            overflow: hidden;
        }

        .code-block::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 32px;
            background: rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.03);
        }

        /* SECTION DIVIDERS */
        .section-divider {
            border-top: 0.5px dashed rgba(37,99,235, 0.2);
            margin: 24px 0;
        }
    </style>
</head>
<body>
    <!-- BACKGROUND LAYERS -->
    <div class="viewport-layer hex-grid"></div>
    <div class="viewport-layer noise-texture"></div>
    <div class="viewport-layer radial-glow"></div>

    <!-- TOOLTIP -->
    <div id="ip-tooltip">
        <div id="tooltip-content"></div>
    </div>

    <!-- APP SHELL -->
    <div id="app">
        <!-- SIDEBAR RAIL -->
        <aside id="sidebar">
            <div class="sidebar-logo">
                <i data-lucide="shield" class="shield-icon"></i>
                <span>HK // HAWKEYE</span>
            </div>
            <nav class="nav-items">
                <a href="#dashboard" class="nav-item active" onclick="navigate('dashboard')">
                    <i data-lucide="layout-dashboard" style="width: 20px; height: 20px"></i>
                    <span>DASHBOARD</span>
                </a>
                <a href="#threats" class="nav-item" onclick="navigate('threats')">
                    <i data-lucide="radar" style="width: 20px; height: 20px"></i>
                    <span>THREAT FEED</span>
                </a>
                <a href="#investigate" class="nav-item" onclick="navigate('investigate')">
                    <i data-lucide="search-check" style="width: 20px; height: 20px"></i>
                    <span>INVESTIGATIONS</span>
                </a>
                <a href="#alerts" class="nav-item" onclick="navigate('alerts')">
                    <i data-lucide="alert-circle" style="width: 20px; height: 20px"></i>
                    <span>ACTIVE ALERTS</span>
                </a>
                <div class="nav-separator"></div>
                <a href="#reports" class="nav-item" onclick="navigate('reports')">
                    <i data-lucide="file-bar-chart" style="width: 20px; height: 20px"></i>
                    <span>ANALYTICS</span>
                </a>
                <a href="#settings" class="nav-item" onclick="navigate('settings')">

                </a>
            </nav>
            <div class="user-avatar"></div>
        </aside>

        <!-- MAIN WINDOW -->
        <main id="main">
            <header>
                <div class="search-rail">
                    <span>/</span>
                    <input type="text" placeholder="search threats, IPs, endpoints, payloads...">
                </div>
                <div class="status-pill">
                    <div class="live-indicator">
                        <div class="live-label">
                            <div class="live-dot"></div>
                            LIVE TELEMETRY
                        </div>
                        <div class="live-time" id="clock">00:00:00</div>
                    </div>
                </div>
            </header>

            <!-- DYNAMIC CONTENT -->
            <div id="page-content"></div>
        </main>
    </div>

    <script>
        // MOCK DATABASE
        const DB = {
            metrics: [
                { id: 'EVT', label: 'TOTAL EVENTS', value: 132408, budget: 85, color: '#2563EB' },
                { id: 'THR', label: 'ACTIVE THREATS', value: 27, budget: 42, color: '#EF4444' },
                { id: 'ALT', label: 'CRITICAL ALERTS', value: 6, budget: 12, color: '#F59E0B' },
                { id: 'BLK', label: 'BLOCKED IPs', value: 492, budget: 68, color: '#22C55E' }
            ],

                { id: 'THR-1002', timestamp: '2026-03-28 17:34:05', ip: '45.227.254.18', type: 'Credential Stuffing', endpoint: '/api/users/session', severity: 'high' },
                { id: 'THR-1003', timestamp: '2026-03-28 17:16:33', ip: '31.13.71.36', type: 'XSS Attempt', endpoint: '/portal/search', severity: 'medium' },
                { id: 'THR-1004', timestamp: '2026-03-28 16:52:19', ip: '103.145.27.94', type: 'DDoS Burst', endpoint: '/api/ingest/events', severity: 'high' },
                { id: 'THR-1005', timestamp: '2026-03-28 16:30:45', ip: '172.18.8.12', type: 'Port Scan', endpoint: '/infra/vpn', severity: 'low' }
            ],
            feed: [
                { id: 101, type: 'danger', msg: 'CRITICAL: SQLI payload from 185.199.108.153', time: '17:54:10' },
                { id: 102, type: 'warning', msg: 'Multiple Auth Failures: root@ssh-01', time: '17:53:45' },
                { id: 103, type: 'blue-accent', msg: 'Heuristic Match: Suspicious User-Agent observed', time: '17:51:22' },
                { id: 104, type: 'success', msg: 'Auto-containment: IP 31.13.71.36 blocked', time: '17:50:05' }
            ],
            trend: [24, 17, 38, 42, 51, 36],
            labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00']
        };

        // NAVIGATION ENGINE
        function navigate(page) {
            const container = document.getElementById('page-content');

        function animateCounters() {
            document.querySelectorAll('.counter').forEach(el => {
                const target = parseInt(el.dataset.value);
                const duration = 1200;
                const start = performance.now();
                
                function update(now) {
                    const elapsed = now - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 5); // easeOutExpo
                    el.innerText = Math.floor(ease * target).toLocaleString();
                    if (progress < 1) requestAnimationFrame(update);
                }
                requestAnimationFrame(update);
            });
        }
